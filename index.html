<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css"> 
</head>
<body id="bgindex" style="background-color: #23153c; margin: 0; padding: 0; overflow: hidden;">
    
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 w-100" style="position: relative; z-index: 1;">
        
        <h1 class="text-white text-uppercase mb-4" style="font-family: 'Arial Black', sans-serif; font-size: 3.5rem; letter-spacing: 4px; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); text-align: center;">
            INTERNSHIP TRACKER
        </h1>

        <div class="card login-card shadow" style="width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.95); border-radius: 10px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-1" style="color: #333;">LOGIN</h3>
                <p class="text-center text-muted mb-4" style="font-size: 0.85rem; letter-spacing: 1px;">
                    Your gateway to professional growth.
                </p>
                
                <div class="row align-items-center"> 
                    <div class="col-md-5 text-center mb-3 mb-md-0">
                        <div class="p-3 bg-light rounded d-flex justify-content-center align-items-center" style="min-height: 120px;">
                            <img src="img/logo.png" alt="Logo" class="img-fluid" style="max-height: 100px;">
                        </div>
                    </div>
                    
                    <div class="col-md-7 border-start-md"> 
                        <form method="get" action="#" onsubmit="alert('Login simulation. Please open README for further information'); return false;" class="row g-3 needs-validation" novalidate>
                            
                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="mark@example.com" required>
                                <div class="invalid-feedback">
                                    Please enter a valid email address.
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                                <div class="invalid-feedback">
                                    Please enter your password.
                                </div>
                            </div>
                            
                            <div class="col-12 text-end my-2">
                                <button type="button" onclick="alert('Error, please open README.');" class="btn btn-outline-success px-4 me-2">Sign Up</button>
                                <button type="submit" class="btn btn-success px-4">Login</button>
                            </div>

                        </form> 
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        // Paksa Vanta.net jalan balik kat GitHub Pages
        try {
            VANTA.NET({
              el: "#bgindex", 
              mouseControls: true,
              touchControls: true,
              gyroControls: false,
              minHeight: 200.00,
              minWidth: 200.00,
              scale: 1.00,
              scaleMobile: 1.00,
              color: 0x55cf55,
              backgroundColor: 0x23153c
            });
        } catch (e) {
            console.log("Vanta background error: ", e);
        }

        // Bootstrap Validation
        (() => {
          'use strict'
          const forms = document.querySelectorAll('.needs-validation')
          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()
    </script>
</body>
</html>
